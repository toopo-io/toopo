name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  quality:
    name: Lint - Typecheck - Build - Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # Dependency-boundary gate (Verification gate #5): the architecture's hard,
      # one-way boundaries, machine-enforced. Runs right after install (no build
      # needed — source-to-source resolution via tsconfig.depcruise.json) so a
      # boundary regression fails fast, before the slower lint/typecheck/build.
      - name: Boundaries
        run: pnpm boundaries

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_AUTH_URL: http://localhost:4000
          NEXT_PUBLIC_DEFAULT_LOCALE: en
          NEXT_PUBLIC_GOOGLE_OAUTH_ENABLED: 'false'
        run: pnpm build

      # The dual-backend suite (ADR-0017) runs against a real Postgres via
      # @testcontainers/postgresql. ubuntu-latest ships a running Docker daemon,
      # so no service container is declared here; testcontainers manages its own.
      # CI=true (set by GitHub) makes the Postgres leg REQUIRED — it fails loudly
      # if Docker is ever unavailable rather than silently skipping.
      - name: Test (with coverage)
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test?sslmode=disable
          BETTER_AUTH_SECRET: ci-placeholder-secret-32-chars-long-xxx
          BETTER_AUTH_URL: http://localhost:4000
          RESEND_FROM_EMAIL: onboarding@resend.dev
          RESEND_FROM_NAME: Toopo
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_AUTH_URL: http://localhost:4000
          NEXT_PUBLIC_DEFAULT_LOCALE: en
          NEXT_PUBLIC_GOOGLE_OAUTH_ENABLED: 'false'
        run: pnpm test:coverage

      # Drift-check (ADR-0017 §4, closing ADR-0012's open gap): regenerate the
      # Better Auth migration SQL from the installed better-auth and fail if it
      # differs from the committed migrations — catches an un-regenerated schema
      # on a better-auth bump or an authSchemaOptions change.
      - name: Auth migration drift-check
        run: |
          pnpm --filter @toopo/db db:generate
          git diff --exit-code packages/db/migrations

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: '**/coverage/lcov.info'
          if-no-files-found: ignore
